name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes it to GitHub Pages.
# Triggered on every push to main and manually via workflow_dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum permissions for GitHub Pages deployment via actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Don't cancel an in-progress production
# deploy; queue subsequent pushes behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Allow this workflow to enable Pages on first run.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: "Build static export (next build emits out/)"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
